<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Flip.gg API Logger</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <h1>Flip.gg API Logger</h1>
    <ul id="stats"></ul>
    <p id="empty" hidden>No calls captured yet. Browse flip.gg to start logging.</p>
    <div class="actions">
      <button id="download">Download JSON</button>
      <button id="reset" class="danger">Reset</button>
    </div>
    <p id="status"></p>
    <script src="popup.js"></script>
  </body>
</html>
